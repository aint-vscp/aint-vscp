<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Vash C. Puno - AI and Automation Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0e14"/>
      <stop offset="0.55" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#121620"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.28" r="0.55">
      <stop offset="0" stop-color="#818cf8" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.4" fill="#ffffff" opacity="0.035"/>
    </pattern>
    <style>
      .name { font-family: 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif; }
      .mono { font-family: 'SFMono-Regular', 'Consolas', 'Liberation Mono', Menlo, monospace; }
    </style>
  </defs>

  <rect width="1200" height="300" rx="16" fill="url(#bg)"/>
  <rect width="1200" height="300" rx="16" fill="url(#dots)"/>
  <rect width="1200" height="300" rx="16" fill="url(#glow)"/>
  <rect x="1" y="1" width="1198" height="298" rx="15" fill="none" stroke="#232a36" stroke-width="1"/>

  <!-- orchestrator motif: a coordinator delegating to worker nodes -->
  <g transform="translate(965,150)" fill="none" stroke="url(#accent)" stroke-width="1.6">
    <g opacity="0.55">
      <line x1="0" y1="0" x2="-95" y2="-70"/>
      <line x1="0" y1="0" x2="105" y2="-48"/>
      <line x1="0" y1="0" x2="118" y2="52"/>
      <line x1="0" y1="0" x2="-70" y2="92"/>
      <line x1="0" y1="0" x2="20" y2="-118"/>
    </g>
    <g fill="#0d1117" stroke="url(#accent)">
      <circle cx="-95" cy="-70" r="10"/>
      <circle cx="105" cy="-48" r="10"/>
      <circle cx="118" cy="52" r="10"/>
      <circle cx="-70" cy="92" r="10"/>
      <circle cx="20" cy="-118" r="9"/>
    </g>
    <circle cx="0" cy="0" r="20" fill="#151b27" stroke="url(#accent)" stroke-width="2"/>
    <circle cx="0" cy="0" r="30" stroke="#818cf8" stroke-opacity="0.25" stroke-width="1">
      <animate attributeName="r" values="26;40;26" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.35;0;0.35" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- identity -->
  <text class="mono" x="80" y="72" font-size="14" letter-spacing="3" fill="#818cf8">PORTFOLIO // AINT-VSCP</text>
  <text class="name" x="78" y="132" font-size="54" font-weight="700" fill="#e6edf3">Vash C. Puno</text>
  <rect x="82" y="150" width="132" height="4" rx="2" fill="url(#accent)"/>
  <text class="name" x="80" y="192" font-size="21" font-weight="600" fill="#c9d1d9">AI &amp; Automation Engineer &#183; System Architect &#183; Founder @ The Pieza</text>
  <text class="name" x="80" y="224" font-size="15" fill="#8b949e">Production AI systems, multi-agent orchestration, and cloud automation.</text>

  <!-- chips -->
  <g class="name" font-size="13" fill="#adbac7">
    <g transform="translate(80,248)">
      <rect width="130" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
      <text x="16" y="20">Computer Science</text>
    </g>
    <g transform="translate(222,248)">
      <rect width="128" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
      <text x="16" y="20">Quezon City, PH</text>
    </g>
    <g transform="translate(362,248)">
      <rect width="180" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
      <text x="16" y="20">Open to internships</text>
    </g>
  </g>
</svg>
